openapi: 3.0.0
info:
  title: Invoice API
  version: 1.0.0
  description: API for creating, managing, and tracking invoices

paths:

  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthInput'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Bad request - missing email or password, or email already in use

  /auth/login:
    post:
      summary: Login with email and password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthInput'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '400':
          description: Bad request - missing email or password
        '401':
          description: Unauthorised - invalid email or password

  /auth/logout:
    post:
      summary: Logout current user
      tags: [Auth]
      parameters:
        - in: header
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorised - no token provided

  /invoices:
    post:
      summary: Create a draft invoice
      tags: [Invoices]
      parameters:
        - in: header
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
      responses:
        '201':
          description: Invoice created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          description: Bad request - missing required fields, invalid date formats, or invalid item values
        '401':
          description: Unauthorised - not logged in
        '403':
          description: Forbidden - no permission to create invoices

  /invoices/{id}:
    get:
      summary: Retrieve an invoice by ID
      tags: [Invoices]
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
        - in: header
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '401':
          description: Unauthorised
        '403':
          description: Forbidden
        '404':
          description: Not found - invoice ID does not exist

    put:
      summary: Update a draft invoice
      tags: [Invoices]
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
        - in: header
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceInput'
      responses:
        '200':
          description: Invoice updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          description: Bad request - invalid values
        '401':
          description: Unauthorised
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: Conflict - invoice already finalised

    delete:
      summary: Delete a draft invoice
      tags: [Invoices]
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
        - in: header
          name: token
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Invoice deleted successfully
        '401':
          description: Unauthorised
        '403':
          description: Forbidden
        '404':
          description: Not found - invoice does not exist
        '409':
          description: Conflict - invoice already finalised, sent, or paid

  /invoices/{id}/status:
    get:
      summary: Get invoice status and lifecycle tracking
      tags: [Invoices]
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
        - in: header
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceWithStatus'
        '401':
          description: Unauthorised
        '403':
          description: Forbidden
        '404':
          description: Not found - invoice ID does not exist
        '409':
          description: Conflict - invalid lifecycle state detected

  /invoices/{id}/pdf:
    get:
      summary: Download invoice as PDF
      tags: [Invoices]
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
        - in: header
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PDF file returned successfully
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorised
        '403':
          description: Forbidden
        '404':
          description: Not found - invoice or PDF not found
        '409':
          description: Conflict - invoice is not finalised yet, PDF not available

components:

  parameters:
    InvoiceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: The unique invoice ID

  schemas:

    AuthInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    Address:
      type: object
      required: [street, city, postcode, country]
      properties:
        street:
          type: string
        city:
          type: string
        postcode:
          type: string
        country:
          type: string

    CustomerInformation:
      type: object
      required: [fullName, email, phone, billingAddress, shippingAddress]
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        billingAddress:
          $ref: '#/components/schemas/Address'
        shippingAddress:
          $ref: '#/components/schemas/Address'

    FromDetails:
      type: object
      required: [businessName, address, taxId, abnNumber]
      properties:
        businessName:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        taxId:
          type: string
        abnNumber:
          type: string

    LineItem:
      type: object
      required: [description, quantity, rate]
      properties:
        description:
          type: string
        quantity:
          type: number
        rate:
          type: number

    TaxDetails:
      type: object
      required: [taxId, countryCode, taxPercentage]
      properties:
        taxId:
          type: string
        countryCode:
          type: string
        taxPercentage:
          type: number

    InvoiceInput:
      type: object
      required: [customer, lineItems, currency, tax, from]
      properties:
        customer:
          $ref: '#/components/schemas/CustomerInformation'
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        currency:
          type: string
          default: AUD
        exchangeRate:
          type: number
        baseCurrency:
          type: string
        tax:
          $ref: '#/components/schemas/TaxDetails'
        from:
          $ref: '#/components/schemas/FromDetails'

    Invoice:
      type: object
      properties:
        id:
          type: string
        customer:
          $ref: '#/components/schemas/CustomerInformation'
        from:
          $ref: '#/components/schemas/FromDetails'
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        currency:
          type: string
        tax:
          $ref: '#/components/schemas/TaxDetails'
        subtotal:
          type: number
        taxAmount:
          type: number
        totalAmount:
          type: number
        status:
          type: string
          enum: [DRAFT, GENERATED, FINALISED, SENT, OVERDUE, PAID]
        createdAt:
          type: string
          format: date-time
        finalisedAt:
          type: string
          format: date-time
        sentAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time

    InvoiceWithStatus:
      allOf:
        - $ref: '#/components/schemas/Invoice'
        - type: object
          properties:
            status:
              type: string
              enum: [DRAFT, GENERATED, FINALISED, SENT, OVERDUE, PAID]
            createdAt:
              type: string
              format: date-time
            finalisedAt:
              type: string
              format: date-time
            sentAt:
              type: string
              format: date-time
            paidAt:
              type: string
              format: date-time